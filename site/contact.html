<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQA | Contact</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.ico">
</head>  
<body>  
    <!-- Header: Contains logo and navigation -->  
    <header>  
        <img src="images/QtFlag.png" class="logo">   
        <nav>  
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>  
    </header>  

    <!-- Main Content: Unique to each page -->  
    <main>
        <div class="centeredContainer">  
            <section class="biSection">
                <div class="first">
                    <h1>Contact</h1>
                    <div class="form-group">  
                        <label for="name">Name:</label>  
                        <input type="text" id="name" required>  
                    </div>  
                    <div class="form-group">  
                        <label for="name">Email:</label>  
                        <input type="text" id="email" required>  
                    </div>  
                     <div class="form-group">  
                        <label for="name">Subject:</label>  
                        <input type="text" id="subject" required>  
                    </div>  
                     <div class="form-group">  
                        <label for="name">Message:</label>  
                        <input type="text" id="message" required>  
                    </div>  
                    <button type="button">Button</button>
                </div>
                <div class="last">
                    <img src="images/Placeholder.png" alt="Alt">
                </div>
            </section>

            <section class="biSection">
                <div class="first">
                    <h1>Follow us!</h1>
                    <button type="button">LinkedIn</button>
                </div>
            </section>

            <section class="biSection">
                <div class="first">
                    <h1>Newsletter</h1>
                    <p>Stay in loop with our company news. Sign up to our newsletter and receive the freshest info.</p>
                    <button type="button">Button</button>
                </div>
                <div class="last">
                    <img src="images/Placeholder.png" alt="Alt">
                </div>
            </section>
        </div>
    </main>  

    <!-- Footer: Shared across all pages -->  
    <footer>  
        <p>&copy; 2024 MyWebsite. All rights reserved.</p>  
    </footer>  
</body>  
</html>
